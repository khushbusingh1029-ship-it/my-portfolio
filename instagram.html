<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        .main{
width: 100%;
display: grid;
grid-template-columns: repeat(2,1fr);
height: 100vh;
        }
        /* first  */
        .first {
            justify-content: center;
            align-items: center;
text-align: center;
border-right: 1px solid rgb(168, 163, 163);
        }
      
       .logo{
           width: 110px;
           object-fit: cover;
         margin: 20px;
        }
.logo img{
    width: 100%;
    height: 100%;
}
h1{
     justify-content: center;
            align-items: center;
text-align: center;
font-weight: 100px;
    width: 500px;
    letter-spacing: 2px;
    line-height: 1.9;
    margin-left: 60px;
    font-family: "Proxima Nova", "Helvetica Neue", Arial, sans-serif;
}

h1 span{
    color: rgb(240, 115, 115);
}
.img{
    position: relative;
    width: 500px;
    height: 400px;
    margin: auto;
    top: 10%;
}
.img span{
    position: absolute;
    top: 40%;
    left: 10%;
z-index: 1000;
    font-size: 60px;
}
.img11{
    top: 50px;
    left: 17%;
transform: rotate(-10deg);
    position: absolute;
    height: 250px;
}

.img10{
    top: 0px;
    left: 30%;
    height: 350px;
    position: absolute;


}
.img12{
    top: 50px;
    transform: rotate(10deg);
    position: absolute;
    height: 250px;

}
img{
    width: 200px;
    height: 300px;
    object-fit: cover;
    border-radius: 20px;
}

/* second */
.second{
        justify-content: center;
                align-items: center;    
                text-align: center;
                
}
.second form{
    margin-top: 30%;
    
}
.heading{
    text-align: left;
    margin-left: 60px;
}
input{
    width: 80%;
    height: 32px;
    border-radius: 12px;
    border: 1px solid gray;
padding: 10px;
    font-size: 15px;

}
input:focus{
    outline: none;
    border: 1px solid rgb(41, 108, 235);
    box-shadow: 0 0 5px rgb(135, 174, 247);
}
button{
     width: 84%;
    height: 46px;
    border-radius: 20px;
    border: 1px solid gray;
background-color: white;
}
.login{
    background-color: rgb(135, 174, 247);
    color: white;
border: none;
    font-size: 15px;
    cursor: not-allowed;
}
.password{
    border: none;
    font-size: 15px;
    cursor: pointer;

}
.newaccount{
    color: rgb(14, 68, 185);
    font-size: 15px;
    cursor: pointer;

}
.facebook:hover, .newaccount:hover, .password:hover{
    background-color: rgb(235, 235, 235);
}
a{
    text-decoration: none;
    color:black;
    font-size: 15px;
}
    </style>
</head>
